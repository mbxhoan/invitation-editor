<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tạo thiệp sự kiện</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Montserrat:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap&subset=vietnamese" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
:root{
  --bg:#f4f2ee; --panel:#fff; --ink:#201d29; --mut:#766f80; --faint:#a39cae;
  --pri:#5b3df5; --pri-d:#4930cc; --danger:#a93226;
  --line:rgba(32,29,41,.1); --line2:rgba(32,29,41,.18);
}
*{-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Be Vietnam Pro',system-ui,sans-serif}
a{color:var(--pri);text-decoration:none}
a:hover{color:var(--pri-d);text-decoration:underline}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp .5s ease both}

.screen{min-height:100vh;box-sizing:border-box}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(32,29,41,.06);box-sizing:border-box}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-sizing:border-box}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--pri)}
.lbl{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--mut)}
.field{display:flex;flex-direction:column;gap:8px}
.muted{color:var(--mut)}

.inp{width:100%;box-sizing:border-box;padding:12px 14px;border-radius:10px;border:1px solid var(--line2);
     background:var(--panel);color:var(--ink);font:500 15px 'Be Vietnam Pro',sans-serif;outline:none}
.inp:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(91,61,245,.15)}
.inp.sm{padding:8px 10px;font-size:13px;border-radius:8px}
.inp.xs{padding:7px 10px;font-size:12px;border-radius:7px;font-weight:500}

.btn{border-radius:10px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);
     padding:12px 18px;font:600 14px 'Be Vietnam Pro',sans-serif;cursor:pointer}
.btn:hover{background:var(--bg)}
.btn.pri{border:none;background:var(--pri);color:#fff}
.btn.pri:hover{background:var(--pri-d)}
.btn.dark{border:none;background:var(--ink);color:#fff}
.btn.dark:hover{background:#3a3547}
.btn.danger{border-color:rgba(192,57,43,.3);color:var(--danger)}
.btn.danger:hover{background:rgba(192,57,43,.06)}
.btn.gold{border:none;background:linear-gradient(135deg,#f0a23c,#e88b1a);color:#2a1500;font-weight:700}
.btn.gold:hover{filter:brightness(1.06)}
.btn.sm{padding:9px 12px;font-size:12.5px;border-radius:8px}
.btn.xs{padding:8px 12px;font-size:12px;border-radius:8px}
.btn.icon{border:none;background:none;color:var(--danger);font-size:15px;padding:2px 6px}

.err{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.25);color:var(--danger);
     border-radius:10px;padding:10px 14px;font-size:13.5px}
.note{font-size:13px;background:var(--bg);border-radius:8px;padding:10px 14px}
.json{margin:0;font-size:11.5px;line-height:1.55;white-space:pre-wrap;word-break:break-all;
      background:#f7f6f3;border-radius:10px;padding:14px}

.overlay{position:fixed;inset:0;background:rgba(16,10,32,.62);display:flex;align-items:center;
         justify-content:center;padding:20px;z-index:50}
.overlay.blur{backdrop-filter:blur(3px)}
.modal{width:100%;background:var(--panel);border-radius:16px;padding:26px;box-sizing:border-box;
       box-shadow:0 30px 80px rgba(0,0,0,.4)}

.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;
        align-items:center;gap:18px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px}
.tab{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--mut);
     font:600 13.5px 'Be Vietnam Pro',sans-serif}
.tab.on{background:var(--ink);color:#fff}
.seg{padding:8px 12px;border-radius:8px;border:1px solid var(--line2);cursor:pointer;background:var(--panel);
     color:var(--ink);font:600 12px 'Be Vietnam Pro',sans-serif}
.seg.on{background:var(--ink);color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;display:flex;
     gap:14px;align-items:center;cursor:pointer;flex-wrap:wrap}
.row:hover{border-color:var(--pri)}
.stack{display:flex;flex-direction:column}
h2.sec{margin:0;font:700 20px 'Be Vietnam Pro',sans-serif}
h3.sec{margin:0;font:700 15px 'Be Vietnam Pro',sans-serif}
.sub{margin:4px 0 0;font-size:13px;color:var(--mut)}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.logmark{font:12.5px ui-monospace,Menlo,monospace;background:var(--panel);border:1px solid rgba(32,29,41,.08);
         border-radius:8px;padding:9px 14px}
.chk{display:flex;gap:4px;align-items:center;cursor:pointer}
.keytag{font:11px ui-monospace,monospace;background:var(--bg);padding:2px 7px;border-radius:5px}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

/* ---------- config (was the prototype's editable props) ---------- */
const ADMIN_PASSWORD = 'admin';
const SHOW_JSON_ON_CARD = false;

/* ---------- utils ---------- */
const $ = (sel) => document.querySelector(sel);
const uid = () => Math.random().toString(36).slice(2, 10);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function load(k) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch (e) { return null; }
}
function save(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); return true; }
  catch (e) { alert('Không lưu được (bộ nhớ trình duyệt đầy). Thử dùng ảnh nền nhỏ hơn.'); return false; }
}
function downloadHref(name, href) {
  const a = document.createElement('a');
  a.download = name; a.href = href; a.click();
}
const downloadJson = (name, obj) =>
  downloadHref(name, 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(obj, null, 2)));

/* ---------- seed data ---------- */
function defaultInputs() {
  return [
    { key: 'title', label: 'Danh xưng', type: 'select', options: ['Ông', 'Bà'], required: true, placeholder: '' },
    { key: 'name', label: 'Họ và tên', type: 'text', placeholder: 'VD: NGUYỄN VĂN A', required: true },
    { key: 'phone', label: 'Số điện thoại (5 số cuối)', type: 'text', placeholder: 'VD: 5 số cuối là 12345', required: true },
    { key: 'position', label: 'Chức danh', type: 'text', placeholder: 'VD: GIÁM ĐỐC KINH DOANH', required: false },
    { key: 'company', label: 'Tên công ty / Đại lý', type: 'text', placeholder: 'VD: NAM VIỆT GROUP', required: false }
  ];
}
function seedEvents() {
  const mk = (name, theme, title, date, venue) => ({
    id: uid(), name, w: 1080, h: 1350, bg: null, theme,
    inputs: defaultInputs(),
    fields: [
      { id: uid(), type: 'static', text: 'TRÂN TRỌNG KÍNH MỜI', x: 540, y: 200, size: 28, font: 'Montserrat', weight: '600', color: theme.gold, align: 'center', upper: false, ls: 8, maxW: 0 },
      { id: uid(), type: 'bind', bind: 'fullNameDisplay', prefix: '', x: 540, y: 285, size: 58, font: 'Playfair Display', weight: '700', color: '#ffffff', align: 'center', upper: true, ls: 1, maxW: 940 },
      { id: uid(), type: 'bind', bind: 'position', prefix: '', x: 540, y: 345, size: 26, font: 'Montserrat', weight: '600', color: theme.gold, align: 'center', upper: true, ls: 3, maxW: 900 },
      { id: uid(), type: 'bind', bind: 'company', prefix: '', x: 540, y: 398, size: 29, font: 'Montserrat', weight: '500', color: theme.soft, align: 'center', upper: true, ls: 1, maxW: 960 },
      { id: uid(), type: 'static', text: 'tới tham dự sự kiện', x: 540, y: 465, size: 26, font: 'Cormorant Garamond', weight: '600', color: theme.soft, align: 'center', upper: false, ls: 2, maxW: 0 },
      { id: uid(), type: 'static', text: title, x: 540, y: 575, size: 50, font: 'Playfair Display', weight: '800', color: theme.gold, align: 'center', upper: true, ls: 1, maxW: 980 },
      { id: uid(), type: 'static', text: date, x: 540, y: 655, size: 30, font: 'Montserrat', weight: '700', color: '#ffffff', align: 'center', upper: false, ls: 1, maxW: 0 },
      { id: uid(), type: 'static', text: venue, x: 540, y: 703, size: 24, font: 'Montserrat', weight: '500', color: theme.soft, align: 'center', upper: false, ls: 1, maxW: 960 },
      { id: uid(), type: 'static', text: 'Rất hân hạnh được đón tiếp!', x: 540, y: 905, size: 30, font: 'Cormorant Garamond', weight: '600', color: theme.gold, align: 'center', upper: false, ls: 0, maxW: 0 },
      { id: uid(), type: 'bind', bind: 'lucky', prefix: 'Lucky Number: ', x: 540, y: 960, size: 33, font: 'Montserrat', weight: '700', color: '#ffffff', align: 'center', upper: false, ls: 1, maxW: 0 },
      { id: uid(), type: 'qr', x: 540, y: 1010, size: 230 },
      { id: uid(), type: 'static', text: 'MÃ QR ĐỂ CHECK-IN', x: 540, y: 1295, size: 20, font: 'Montserrat', weight: '600', color: theme.soft, align: 'center', upper: false, ls: 4, maxW: 0 }
    ]
  });
  const evs = [
    mk('SỰ KIỆN KICK-OFF DỰ ÁN THÁP VÀNG RIVERSIDE', { c1: '#2b1657', c2: '#120a2e', glow: 'rgba(147,88,255,.45)', gold: '#e9c88f', soft: '#d9cff0' }, 'KHAI MỞ TỌA ĐỘ TƯƠNG LAI', '30.07.2026  |  08:00 - Thứ Năm', 'TẦNG 5 – GEM CENTER, TP. HỒ CHÍ MINH'),
    mk('GALA DINNER TRI ÂN ĐỐI TÁC 2026', { c1: '#0e2148', c2: '#050b18', glow: 'rgba(64,120,255,.35)', gold: '#f0d9a0', soft: '#c6d4f2' }, 'ĐÊM TRI ÂN – KẾT NỐI THỊNH VƯỢNG', '12.09.2026  |  18:00 - Thứ Bảy', 'BALLROOM A – REX HOTEL, TP. HỒ CHÍ MINH'),
    mk('LỄ RA MẮT SẢN PHẨM AURORA', { c1: '#0b3d35', c2: '#02120f', glow: 'rgba(45,212,168,.32)', gold: '#e8dcb8', soft: '#bfe3d6' }, 'AURORA – BỪNG SÁNG KỶ NGUYÊN MỚI', '05.10.2026  |  09:00 - Thứ Hai', 'TRUNG TÂM HỘI NGHỊ QUỐC GIA, HÀ NỘI')
  ];
  save('ecard.events', evs);
  return evs;
}

const DEFAULT_THEME = { c1: '#2b1657', c2: '#120a2e', glow: 'rgba(147,88,255,.45)', gold: '#e9c88f', soft: '#d9cff0' };
const FONTS = ['Playfair Display', 'Montserrat', 'Cormorant Garamond', 'Be Vietnam Pro'];
const WEIGHTS = ['400', '500', '600', '700', '800'];

/* ---------- canvas rendering ---------- */
const IMGS = {};
function getImg(src) {
  let e = IMGS[src];
  if (!e) {
    e = { img: new Image(), ok: false };
    e.img.onload = () => { e.ok = true; render(); };
    e.img.src = src;
    IMGS[src] = e;
  }
  return e.ok ? e.img : null;
}
function drawBg(ctx, ev) {
  const w = ev.w, h = ev.h;
  if (ev.bg) {
    const img = getImg(ev.bg);
    ctx.fillStyle = '#141021'; ctx.fillRect(0, 0, w, h);
    if (img) {
      const sc = Math.max(w / img.width, h / img.height);
      const dw = img.width * sc, dh = img.height * sc;
      ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
    }
    return;
  }
  const t = ev.theme || DEFAULT_THEME;
  const lg = ctx.createLinearGradient(0, 0, 0, h);
  lg.addColorStop(0, t.c1); lg.addColorStop(1, t.c2);
  ctx.fillStyle = lg; ctx.fillRect(0, 0, w, h);
  const rg = ctx.createRadialGradient(w / 2, h * 0.42, 60, w / 2, h * 0.42, w * 0.62);
  rg.addColorStop(0, t.glow); rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = t.gold; ctx.globalAlpha = 0.5; ctx.lineWidth = 3;
  ctx.strokeRect(34, 34, w - 68, h - 68);
  ctx.globalAlpha = 0.22; ctx.lineWidth = 1; ctx.strokeRect(48, 48, w - 96, h - 96);
  ctx.globalAlpha = 0.9; ctx.fillStyle = t.gold;
  ctx.beginPath(); ctx.arc(w / 2, 128, 4, 0, 7); ctx.fill();
  ctx.fillRect(w / 2 - 90, 126, 60, 2); ctx.fillRect(w / 2 + 30, 126, 60, 2);
  ctx.globalAlpha = 1;
}
function resolveText(f, payload) {
  if (f.type === 'static') return f.text || '';
  const v = (payload.data && payload.data[f.bind] != null
    ? payload.data[f.bind]
    : (payload.computed ? payload.computed[f.bind] : '')) || '';
  return (f.prefix || '') + v;
}
function drawText(ctx, f, text) {
  if (!text) return;
  if (f.upper) text = String(text).toUpperCase();
  let size = f.size;
  ctx.font = `${f.weight || '400'} ${size}px "${f.font}"`;
  try { ctx.letterSpacing = (f.ls || 0) + 'px'; } catch (e) {}
  if (f.maxW > 0) {
    const m = ctx.measureText(text).width;
    if (m > f.maxW) {
      size = Math.max(10, size * f.maxW / m);
      ctx.font = `${f.weight || '400'} ${size}px "${f.font}"`;
    }
  }
  ctx.textAlign = f.align || 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = f.color || '#fff';
  ctx.fillText(text, f.x, f.y + size * 0.75);
  try { ctx.letterSpacing = '0px'; } catch (e) {}
}
function drawQr(ctx, f, content) {
  const size = f.size || 200, x = f.x - size / 2, y = f.y;
  ctx.fillStyle = '#ffffff';
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x - 12, y - 12, size + 24, size + 24, 12); ctx.fill(); }
  else ctx.fillRect(x - 12, y - 12, size + 24, size + 24);
  ctx.fillStyle = '#1a1030';
  if (window.qrcode) {
    try {
      const qr = window.qrcode(0, 'M');
      qr.addData(content); qr.make();
      const n = qr.getModuleCount(), cell = size / n;
      for (let ri = 0; ri < n; ri++)
        for (let ci = 0; ci < n; ci++)
          if (qr.isDark(ri, ci)) ctx.fillRect(x + ci * cell, y + ri * cell, Math.ceil(cell), Math.ceil(cell));
      return;
    } catch (e) {}
  }
  // fallback pattern when the QR lib failed to load — decorative only
  const n = 25, cell = size / n, seed = hash(content);
  for (let ri = 0; ri < n; ri++) for (let ci = 0; ci < n; ci++) {
    const inFinder = (ri < 7 && ci < 7) || (ri < 7 && ci >= n - 7) || (ri >= n - 7 && ci < 7);
    if (inFinder) {
      const rr = Math.min(ri, 6), cc = ci >= n - 7 ? ci - (n - 7) : Math.min(ci, 6);
      if (rr === 0 || rr === 6 || cc === 0 || cc === 6 || (rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4))
        ctx.fillRect(x + ci * cell, y + ri * cell, Math.ceil(cell), Math.ceil(cell));
    } else if ((hash(seed + '-' + ri + '-' + ci) % 100) < 46) {
      ctx.fillRect(x + ci * cell, y + ri * cell, Math.ceil(cell), Math.ceil(cell));
    }
  }
}
function drawCard(canvas, ev, payload) {
  canvas.width = ev.w; canvas.height = ev.h;
  const ctx = canvas.getContext('2d');
  drawBg(ctx, ev);
  for (const f of ev.fields) {
    if (f.type === 'qr') drawQr(ctx, f, payload.computed.qrContent);
    else drawText(ctx, f, resolveText(f, payload));
  }
}

/* ---------- payloads ---------- */
function buildPayload(ev, data) {
  const name = data.name || '', title = data.title || '';
  const lucky = 1000 + hash((name + '|' + (data.phone || '')).toLowerCase()) % 9000;
  return {
    id: uid(), eventId: ev.id, eventName: ev.name, createdAt: new Date().toISOString(), data,
    computed: {
      fullNameDisplay: ((title ? title + ' ' : '') + name).toUpperCase().trim(),
      lucky: String(lucky),
      qrContent: 'CHECKIN|' + ev.id + '|' + name + '|' + (data.phone || '') + '|' + lucky
    },
    source: 'event-card-app'
  };
}
function samplePayload(ev) {
  const data = {};
  for (const i of ev.inputs)
    data[i.key] = i.type === 'select'
      ? (i.options && i.options[0]) || ''
      : (i.placeholder || i.label).replace(/^VD:\s*/i, '');
  return buildPayload(ev, data);
}

/* ---------- state ---------- */
const events0 = load('ecard.events') || seedEvents();
const S = {
  view: 'home',
  events: events0,
  guests: load('ecard.guests') || [],
  webhook: load('ecard.webhook') || { url: '', logs: [] },
  selEventId: events0[0] ? events0[0].id : '',
  formValues: {}, formErr: '',
  dupe: null, card: null, copyLabel: 'Copy JSON',
  loginVal: '', loginErr: false, authed: false,
  adminTab: 'events',
  viewGuest: null, resendMsg: '', webhookMsg: '', webhookDraft: null,
  editor: null
};
const curEvent = () => S.events.find((e) => e.id === S.selEventId);

/* ---------- handler registry + event delegation ----------
   Templates embed a handler id (data-click / data-change / data-file / data-down);
   the table is rebuilt each render so handlers never outlive their markup. */
let handlers = {}, hSeq = 0;
function on(fn) { const k = 'h' + (++hSeq); handlers[k] = fn; return k; }
const fire = (attr) => (e) => {
  const t = e.target.closest('[data-' + attr + ']');
  if (!t) return;
  if (t.tagName === 'A') e.preventDefault();
  const fn = handlers[t.dataset[attr]];
  if (fn) fn(e, t);
};

/* ---------- render ---------- */
function render() {
  const app = $('#app');
  // preserve caret across the full re-render; inputs carry a stable data-k
  const ae = document.activeElement;
  const k = ae && ae.dataset ? ae.dataset.k : null;
  let selStart = null, selEnd = null;
  if (k) { try { selStart = ae.selectionStart; selEnd = ae.selectionEnd; } catch (e) {} }

  handlers = {};
  app.innerHTML = viewFor(S.view) + (S.dupe ? dupeModal() : '') + (S.viewGuest ? guestModal() : '');

  if (k) {
    const el = app.querySelector('[data-k="' + k + '"]');
    if (el) {
      el.focus();
      if (selStart != null) { try { el.setSelectionRange(selStart, selEnd); } catch (e) {} }
    }
  }
  paint();
}
function viewFor(v) {
  if (v === 'card') return cardView();
  if (v === 'login') return loginView();
  if (v === 'admin') return adminView();
  if (v === 'editor') return editorView();
  return homeView();
}
function paint() {
  if (S.view === 'card' && S.card) {
    const c = $('#cardCanvas'), ev = S.events.find((e) => e.id === S.card.eventId);
    if (c && ev) drawCard(c, ev, S.card.payload);
  }
  if (S.view === 'editor' && S.editor) {
    // placements are positioned from the wrapper's real width, which is only
    // measurable after the markup lands — re-render once when it changes
    const wrap = $('#edWrap');
    if (wrap && wrap.clientWidth && wrap.clientWidth !== S._edW) {
      S._edW = wrap.clientWidth;
      return render();
    }
    const c = $('#edCanvas'), ev = S.editor.ev;
    if (c) {
      const sc = 0.5;
      c.width = ev.w * sc; c.height = ev.h * sc;
      const ctx = c.getContext('2d');
      ctx.save(); ctx.scale(sc, sc); drawBg(ctx, ev); ctx.restore();
    }
  }
}
const go = (view, patch) => { Object.assign(S, patch || {}, { view }); render(); };

/* ---------- home: guest form ---------- */
function homeView() {
  const ev = curEvent();
  const fields = ev ? ev.inputs.map((i) => {
    const val = S.formValues[i.key] || '';
    const ch = on((e) => { S.formValues[i.key] = e.target.value; S.formErr = ''; render(); });
    const control = i.type === 'select'
      ? `<select class="inp" data-k="f.${esc(i.key)}" data-change="${ch}">
           <option value="">${esc(i.label)}</option>
           ${(i.options || []).map((o) => `<option value="${esc(o)}"${o === val ? ' selected' : ''}>${esc(o)}</option>`).join('')}
         </select>`
      : `<input class="inp" data-k="f.${esc(i.key)}" data-change="${ch}"
                value="${esc(val)}" placeholder="${esc(i.placeholder || '')}">`;
    return `<div class="field"><label class="lbl">${esc(i.label.toUpperCase())}</label>${control}</div>`;
  }).join('') : '';

  const evChange = on((e) => { S.selEventId = e.target.value; S.formErr = ''; render(); });
  return `
  <div class="screen" style="display:flex;flex-direction:column;align-items:center;padding:52px 20px 32px">
    <div class="stack fade" style="align-items:center;gap:10px">

function submit() {
  const ev = curEvent();
  if (!ev) { S.formErr = 'Vui lòng chọn sự kiện.'; return render(); }
  for (const i of ev.inputs) {
    if (i.required && !(S.formValues[i.key] || '').trim()) {
      S.formErr = 'Vui lòng nhập: ' + i.label;
      return render();
    }
  }
  S.formErr = '';
  const payload = buildPayload(ev, { ...S.formValues });
  const norm = (x) => (x || '').trim().toLowerCase();
  const matches = S.guests.filter((g) => g.eventId === ev.id && norm(g.data.name) === norm(S.formValues.name));
  if (matches.length) { S.dupe = { payload, checkedId: matches[0].id, matches }; render(); }
  else finalize(payload, null);
}
function finalize(payload, replaceId) {
  S.guests = replaceId ? S.guests.map((g) => (g.id === replaceId ? payload : g)) : [...S.guests, payload];
  save('ecard.guests', S.guests);
  S.dupe = null;
  S.card = { eventId: payload.eventId, payload };
  S.copyLabel = 'Copy JSON';
  go('card');
  if (S.webhook.url) sendWebhook(S.webhook.url, payload, 'auto');
}

async function sendWebhook(url, payload, kind) {
  const t = new Date().toLocaleTimeString('vi-VN');
  let line, ok = false;
  try {
    const r = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
    });
    ok = r.ok;
    line = `[${t}] ${kind} → ${url} — HTTP ${r.status}`;
  } catch (e) {
    line = `[${t}] ${kind} → ${url} — LỖI: không gửi được (mạng hoặc CORS chặn)`;
  }
  S.webhook = { ...S.webhook, logs: [{ line, ok }, ...S.webhook.logs].slice(0, 30) };
  save('ecard.webhook', S.webhook);
  render();
  return { ok, line };
}

const newTextField = (extra) => ({
  id: uid(), x: 540, y: 640, size: 32, font: 'Montserrat', weight: '600', color: '#ffffff',
  align: 'center', upper: false, ls: 0, maxW: 0, ...extra
});
const fieldName = (f) =>
  f.type === 'qr' ? '▣ QR check-in'
    : f.type === 'bind' ? '⤷ ' + (f.bind === 'lucky' ? 'Lucky Number' : f.bind)
      : '“' + (f.text || '').slice(0, 28) + '”';

function addField(f) { S.editor.ev.fields.push(f); S.editor.sel = f.id; render(); }
function selField() { return S.editor.ev.fields.find((f) => f.id === S.editor.sel); }
function edSel(mutate) { const f = selField(); if (f) { mutate(f); render(); } }

function onDragField(e, fid) {
  e.preventDefault();
  S.editor.sel = fid;
  render();
  const wrap = $('#edWrap'), ev = S.editor.ev;
  const f = ev.fields.find((x) => x.id === fid);
  if (!wrap || !f) return;
  const el = wrap.querySelector('[data-fid="' + fid + '"]');
  const scale = wrap.clientWidth / ev.w;
  const sx = e.clientX, sy = e.clientY, ox = f.x, oy = f.y;
  let nx = ox, ny = oy;
  const move = (me) => {
    nx = Math.max(0, Math.min(ev.w, Math.round(ox + (me.clientX - sx) / scale)));
    ny = Math.max(0, Math.min(ev.h, Math.round(oy + (me.clientY - sy) / scale)));
    // move the node directly during the drag; state + full re-render land on pointerup
    if (el) {
      el.style.left = (f.type === 'qr' ? nx - f.size / 2 : nx) * scale + 'px';
      el.style.top = ny * scale + 'px';
    }
  };
  const up = () => {
    window.removeEventListener('pointermove', move);
    window.removeEventListener('pointerup', up);
    f.x = nx; f.y = ny; render();
  };
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', up);
}

function uploadBg(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const rd = new FileReader();
  rd.onload = () => {
    const img = new Image();
    img.onload = () => {
      // downscale before storing — localStorage chokes on full-size data URLs
      const MAX = 1400, sc = Math.min(1, MAX / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * sc);
      c.height = Math.round(img.height * sc);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      const ev = S.editor.ev;
      ev.bg = c.toDataURL('image/jpeg', 0.85);
      ev.w = c.width; ev.h = c.height;
      render();
    };
    img.src = rd.result;
  };
  rd.readAsDataURL(file);
  e.target.value = '';
}

function editorView() {
  const ed = S.editor, ev = ed.ev, sample = samplePayload(ev);
  const sc = (S._edW || 540) / ev.w;

  const placements = ev.fields.map((f) => {
    const isQr = f.type === 'qr', on_ = ed.sel === f.id;
    const outline = on_ ? '2px solid #38bdf8' : '1px dashed rgba(255,255,255,.25)';
    let style = `position:absolute;cursor:move;touch-action:none;line-height:1.15;white-space:nowrap;` +
      `outline:${outline};outline-offset:2px;border-radius:3px;`;
    let inner = '';
    if (isQr) {
      style += `left:${(f.x - f.size / 2) * sc}px;top:${f.y * sc}px;width:${f.size * sc}px;height:${f.size * sc}px;`;
      inner = `<div style="width:100%;height:100%;background:rgba(255,255,255,.92);color:#1a1030;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;border-radius:6px;box-sizing:border-box">QR</div>`;
    } else {
      const tf = f.align === 'center' ? 'translateX(-50%)' : f.align === 'right' ? 'translateX(-100%)' : 'none';
      style += `left:${f.x * sc}px;top:${f.y * sc}px;transform:${tf};font-family:'${f.font}',sans-serif;` +
        `font-weight:${f.weight};font-size:${Math.max(6, f.size * sc)}px;color:${f.color};` +
        `letter-spacing:${(f.ls || 0) * sc}px;text-transform:${f.upper ? 'uppercase' : 'none'};` +
        `max-width:${f.maxW > 0 ? f.maxW * sc + 'px' : 'none'};overflow:hidden;text-overflow:ellipsis;`;
      inner = esc(resolveText(f, sample));
    }
    return `<div data-fid="${esc(f.id)}" style="${style}" data-down="${on((e) => onDragField(e, f.id))}">${inner}</div>`;
  }).join('');

  const inputRows = ev.inputs.map((i) => `
    <div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px;align-items:center">
        <input class="inp xs" style="flex:1;font-weight:600;font-size:12.5px" data-k="ed.lbl.${esc(i.key)}" value="${esc(i.label)}"
               data-change="${on((e) => { i.label = e.target.value; render(); })}">
        <button class="btn icon" data-click="${on(() => { ev.inputs = ev.inputs.filter((z) => z.key !== i.key); render(); })}">✕</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--mut)">
        <span class="keytag">${esc(i.key)}</span>
        <label class="chk"><input type="checkbox"${i.type === 'select' ? ' checked' : ''}
          data-change="${on(() => {
            i.type = i.type === 'select' ? 'text' : 'select';
            if (i.type === 'select' && !i.options) i.options = ['Lựa chọn 1', 'Lựa chọn 2'];
            render();
          })}">Chọn từ danh sách</label>
        <label class="chk"><input type="checkbox"${i.required ? ' checked' : ''}
          data-change="${on(() => { i.required = !i.required; render(); })}">Bắt buộc</label>
      </div>
      ${i.type === 'select'
        ? `<input class="inp xs" data-k="ed.opt.${esc(i.key)}" value="${esc((i.options || []).join(', '))}" placeholder="Các lựa chọn, cách nhau dấu phẩy"
                  data-change="${on((e) => { i.options = e.target.value.split(',').map((o) => o.trim()).filter(Boolean); render(); })}">`
        : `<input class="inp xs" data-k="ed.ph.${esc(i.key)}" value="${esc(i.placeholder || '')}" placeholder="Gợi ý trong ô nhập (placeholder)"
                  data-change="${on((e) => { i.placeholder = e.target.value; render(); })}">`}
    </div>`).join('');

  const placeList = ev.fields.map((f) => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;
                background:${ed.sel === f.id ? 'rgba(91,61,245,.1)' : '#f7f6f3'};
                border:1px solid ${ed.sel === f.id ? 'var(--pri)' : 'rgba(32,29,41,.08)'}"
         data-click="${on(() => { ed.sel = f.id; render(); })}">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(fieldName(f))}</span>
      <button class="btn icon" style="font-size:13px" data-click="${on(() => {
        ev.fields = ev.fields.filter((z) => z.id !== f.id);
        if (ed.sel === f.id) ed.sel = null;
        render();
      })}">✕</button>
    </div>`).join('');

  const onSave = on(() => {
    S.events = S.events.map((x) => (x.id === ev.id ? ev : x));
    if (save('ecard.events', S.events)) go('admin', { editor: null });
  });

  return `
  <div class="screen">
    <div class="topbar" style="padding:12px 22px;gap:14px">
      <button class="btn xs" data-click="${on(() => go('admin', { editor: null }))}">← Hủy</button>
      <input class="inp sm" style="flex:1;min-width:200px;font:600 14.5px 'Be Vietnam Pro',sans-serif" data-k="ed.name" value="${esc(ev.name)}"
             data-change="${on((e) => { ev.name = e.target.value; })}">
      <button class="btn pri" style="padding:10px 20px" data-click="${onSave}">Lưu template</button>
    </div>
    <div style="display:flex;gap:22px;padding:22px;flex-wrap:wrap;align-items:flex-start;max-width:1180px;margin:0 auto;box-sizing:border-box">
      <div style="flex:1.3;min-width:300px">
        <div class="muted" style="font-size:12px;margin-bottom:10px">Kéo-thả các thành phần trực tiếp trên thiệp. Bấm vào thành phần để chỉnh thuộc tính.</div>
        <div id="edWrap" style="position:relative;width:100%;max-width:560px;border-radius:12px;overflow:hidden;box-shadow:0 16px 40px rgba(32,29,41,.2);touch-action:none;user-select:none;line-height:0">
          <canvas id="edCanvas" style="width:100%;display:block"></canvas>
          ${placements}
        </div>
      </div>
      <div style="flex:1;min-width:300px;max-width:420px;display:flex;flex-direction:column;gap:16px">

        <div class="card" style="padding:18px;display:flex;flex-direction:column;gap:12px">
          <div class="lbl" style="font-size:13px;letter-spacing:.06em">ẢNH NỀN THIỆP</div>
          <div class="muted" style="font-size:12.5px;line-height:1.5">Tải lên ảnh thiết kế sẵn (PNG/JPG) đã chừa trống vị trí. Chưa có ảnh thì dùng nền demo.</div>
          <input type="file" accept="image/*" style="font-size:12.5px" data-file="${on(uploadBg)}">
          ${ev.bg ? `<button class="btn danger xs" style="align-self:flex-start" data-click="${on(() => { ev.bg = null; render(); })}">Bỏ ảnh nền (về nền demo)</button>` : ''}
          <div style="display:flex;gap:10px;align-items:center">
            <label class="muted" style="font-size:12px">Khổ thiệp:</label>
            <input class="inp sm" style="width:70px" data-k="ed.w" value="${ev.w}"
                   data-change="${on((e) => { const n = parseInt(e.target.value); if (!isNaN(n)) { ev.w = Math.max(200, Math.min(3000, n)); render(); } })}">
            <span style="color:var(--faint)">×</span>
            <input class="inp sm" style="width:70px" data-k="ed.h" value="${ev.h}"
                   data-change="${on((e) => { const n = parseInt(e.target.value); if (!isNaN(n)) { ev.h = Math.max(200, Math.min(3000, n)); render(); } })}">
            <span style="font-size:12px;color:var(--faint)">px</span>
          </div>
        </div>

        <div class="card" style="padding:18px;display:flex;flex-direction:column;gap:10px">
          <div class="lbl" style="font-size:13px;letter-spacing:.06em">TRƯỜNG KHÁCH NHẬP</div>
          ${inputRows}
          <button class="btn xs" style="align-self:flex-start;border-style:dashed" data-click="${on(() => {
            ev.inputs.push({ key: 'field_' + uid().slice(0, 4), label: 'Trường mới', type: 'text', placeholder: '', required: false });
            render();
          })}">+ Thêm trường nhập</button>
        </div>

        <div class="card" style="padding:18px;display:flex;flex-direction:column;gap:10px">
          <div class="lbl" style="font-size:13px;letter-spacing:.06em">THÀNH PHẦN TRÊN THIỆP</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn xs" data-click="${on(() => addField(newTextField({ type: 'bind', bind: (ev.inputs[0] && ev.inputs[0].key) || 'name', prefix: '' })))}">+ Dữ liệu khách</button>
            <button class="btn xs" data-click="${on(() => addField(newTextField({ type: 'static', text: 'Nội dung mới' })))}">+ Chữ tĩnh</button>
            <button class="btn xs" data-click="${on(() => addField({ id: uid(), type: 'qr', x: 540, y: 900, size: 220 }))}">+ QR check-in</button>
            <button class="btn xs" data-click="${on(() => addField(newTextField({ type: 'bind', bind: 'lucky', prefix: 'Lucky Number: ', color: '#e9c88f' })))}">+ Lucky Number</button>
          </div>
          <div class="stack" style="gap:5px;max-height:180px;overflow:auto">${placeList}</div>
        </div>

        ${selField() ? inspector(ev, selField()) : ''}
      </div>
    </div>
  </div>`;
}

function inspector(ev, sel) {
  const isText = sel.type !== 'qr';
  const num = (k, label, width, parse) => `
    <div class="field" style="gap:6px;width:${width}">
      <label class="lbl" style="font-size:11.5px;letter-spacing:0">${label}</label>
      <input class="inp sm" data-k="sel.${k}" value="${esc(sel[k] ?? 0)}"
             data-change="${on((e) => { const n = parse(e.target.value); if (n != null) edSel((f) => { f[k] = n; }); })}">
    </div>`;
  const int = (v) => { const n = parseInt(v); return isNaN(n) ? null : n; };
  const alignBtn = (a, label) =>
    `<button class="seg${(sel.align || 'center') === a ? ' on' : ''}" data-click="${on(() => edSel((f) => { f.align = a; }))}">${label}</button>`;

  const bindOptions = [
    ...ev.inputs.map((i) => ({ v: i.key, label: i.label + ' (' + i.key + ')' })),
    { v: 'fullNameDisplay', label: 'Danh xưng + Họ tên (fullNameDisplay)' },
    { v: 'lucky', label: 'Lucky Number (tự sinh)' }
  ];

  return `
  <div style="background:var(--panel);border:2px solid var(--pri);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px">
    <div style="font:700 13px 'Be Vietnam Pro',sans-serif;letter-spacing:.06em;color:var(--pri)">THUỘC TÍNH — ${esc(fieldName(sel))}</div>

    ${sel.type === 'bind' ? `
    <div class="field" style="gap:6px">
      <label class="lbl" style="font-size:11.5px;letter-spacing:0">Nguồn dữ liệu</label>
      <select class="inp sm" data-k="sel.bind" data-change="${on((e) => edSel((f) => { f.bind = e.target.value; }))}">
        ${bindOptions.map((b) => `<option value="${esc(b.v)}"${b.v === sel.bind ? ' selected' : ''}>${esc(b.label)}</option>`).join('')}
      </select>
    </div>
    <div class="field" style="gap:6px">
      <label class="lbl" style="font-size:11.5px;letter-spacing:0">Chữ đứng trước (prefix)</label>
      <input class="inp sm" data-k="sel.prefix" value="${esc(sel.prefix || '')}"
             data-change="${on((e) => edSel((f) => { f.prefix = e.target.value; }))}">
    </div>` : ''}

    ${sel.type === 'static' ? `
    <div class="field" style="gap:6px">
      <label class="lbl" style="font-size:11.5px;letter-spacing:0">Nội dung chữ</label>
      <input class="inp sm" data-k="sel.text" value="${esc(sel.text || '')}"
             data-change="${on((e) => edSel((f) => { f.text = e.target.value; }))}">
    </div>` : ''}

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${num('x', 'X', '86px', int)}
      ${num('y', 'Y', '86px', int)}
      ${num('size', isText ? 'Cỡ chữ' : 'Cỡ QR', '86px', (v) => { const n = int(v); return n == null ? null : Math.max(6, n); })}
    </div>

    ${isText ? `
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="gap:6px;flex:1;min-width:140px">
        <label class="lbl" style="font-size:11.5px;letter-spacing:0">Font chữ</label>
        <select class="inp sm" data-k="sel.font" data-change="${on((e) => edSel((f) => { f.font = e.target.value; }))}">
          ${FONTS.map((v) => `<option${v === sel.font ? ' selected' : ''}>${esc(v)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="gap:6px;width:90px">
        <label class="lbl" style="font-size:11.5px;letter-spacing:0">Độ đậm</label>
        <select class="inp sm" data-k="sel.weight" data-change="${on((e) => edSel((f) => { f.weight = e.target.value; }))}">
          ${WEIGHTS.map((v) => `<option${v === (sel.weight || '400') ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="gap:6px;width:70px">
        <label class="lbl" style="font-size:11.5px;letter-spacing:0">Màu</label>
        <input type="color" data-k="sel.color" value="${esc(sel.color || '#ffffff')}"
               style="width:100%;height:37px;padding:2px;border-radius:8px;border:1px solid var(--line2);background:#fff;cursor:pointer"
               data-change="${on((e) => edSel((f) => { f.color = e.target.value; }))}">
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div class="field" style="gap:6px">
        <label class="lbl" style="font-size:11.5px;letter-spacing:0">Căn lề</label>
        <div style="display:flex;gap:4px">${alignBtn('left', 'Trái')}${alignBtn('center', 'Giữa')}${alignBtn('right', 'Phải')}</div>
      </div>
      <div class="field" style="gap:6px;width:100px">
        <label class="lbl" style="font-size:11.5px;letter-spacing:0">Giãn chữ (px)</label>
        <input class="inp sm" data-k="sel.ls" value="${esc(sel.ls || 0)}"
               data-change="${on((e) => { const n = parseFloat(e.target.value); edSel((f) => { f.ls = isNaN(n) ? 0 : n; }); })}">
      </div>
      <div class="field" style="gap:6px;width:110px">
        <label class="lbl" style="font-size:11.5px;letter-spacing:0">Rộng tối đa</label>
        <input class="inp sm" data-k="sel.maxW" value="${esc(sel.maxW || 0)}"
               data-change="${on((e) => { const n = parseInt(e.target.value); edSel((f) => { f.maxW = isNaN(n) ? 0 : n; }); })}">
      </div>
    </div>
    <label class="chk" style="gap:6px;font-size:12.5px;color:var(--ink)">
      <input type="checkbox"${sel.upper ? ' checked' : ''} data-change="${on(() => edSel((f) => { f.upper = !f.upper; }))}">VIẾT HOA toàn bộ
    </label>` : ''}
  </div>`;
}

/* ---------- boot ---------- */
const app = $('#app');
app.addEventListener('click', fire('click'));
app.addEventListener('input', fire('change'));
app.addEventListener('change', (e) => { if (e.target.type === 'file') fire('file')(e); });
app.addEventListener('keydown', fire('key'));
app.addEventListener('pointerdown', fire('down'));

render();

// re-render once webfonts are ready so canvas metrics use the real faces
Promise.all([
  '400 20px "Be Vietnam Pro"', '700 20px "Playfair Display"', '800 20px "Playfair Display"',
  '600 20px "Montserrat"', '700 20px "Montserrat"', '600 20px "Cormorant Garamond"'
].map((f) => document.fonts.load(f))).then(render).catch(() => {});

// editor placement math depends on the wrapper's measured width
addEventListener('resize', () => { if (S.view === 'editor') render(); });
</script>
</body>
</html>
