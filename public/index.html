<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tạo thiệp sự kiện</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Montserrat:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap&subset=vietnamese" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="/shared.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
:root{
  --bg:#f4f2ee; --panel:#fff; --ink:#201d29; --mut:#766f80; --faint:#a39cae;
  --pri:#5b3df5; --pri-d:#4930cc; --danger:#a93226;
  --line:rgba(32,29,41,.1); --line2:rgba(32,29,41,.18);
}
*{-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Be Vietnam Pro',system-ui,sans-serif}
a{color:var(--pri);text-decoration:none}
a:hover{color:var(--pri-d);text-decoration:underline}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp .5s ease both}

.screen{min-height:100vh;box-sizing:border-box}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(32,29,41,.06);box-sizing:border-box}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-sizing:border-box}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--pri)}
.lbl{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--mut)}
.lbl.plain{letter-spacing:0;font-size:11.5px}
.field{display:flex;flex-direction:column;gap:8px}
.muted{color:var(--mut)}
.stack{display:flex;flex-direction:column}

.inp{width:100%;box-sizing:border-box;padding:12px 14px;border-radius:10px;border:1px solid var(--line2);
     background:var(--panel);color:var(--ink);font:500 15px 'Be Vietnam Pro',sans-serif;outline:none}
.inp:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(91,61,245,.15)}
.inp.sm{padding:8px 10px;font-size:13px;border-radius:8px}
.inp.xs{padding:7px 10px;font-size:12px;border-radius:7px;font-weight:500}
textarea.inp{font:500 12.5px/1.55 ui-monospace,Menlo,monospace;resize:vertical}

.btn{border-radius:10px;border:1px solid var(--line2);background:var(--panel);color:var(--ink);
     padding:12px 18px;font:600 14px 'Be Vietnam Pro',sans-serif;cursor:pointer}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.55;cursor:default}
.btn.pri{border:none;background:var(--pri);color:#fff}
.btn.pri:hover{background:var(--pri-d)}
.btn.dark{border:none;background:var(--ink);color:#fff}
.btn.dark:hover{background:#3a3547}
.btn.danger{border-color:rgba(192,57,43,.3);color:var(--danger)}
.btn.danger:hover{background:rgba(192,57,43,.06)}
.btn.gold{border:none;background:linear-gradient(135deg,#f0a23c,#e88b1a);color:#2a1500;font-weight:700}
.btn.gold:hover{filter:brightness(1.06)}
.btn.sm{padding:9px 12px;font-size:12.5px;border-radius:8px}
.btn.xs{padding:8px 12px;font-size:12px;border-radius:8px}
.btn.icon{border:none;background:none;color:var(--danger);font-size:15px;padding:2px 6px}

.err{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.25);color:var(--danger);
     border-radius:10px;padding:10px 14px;font-size:13.5px}
.ok{background:rgba(30,122,70,.08);border:1px solid rgba(30,122,70,.25);color:#1e7a46;
    border-radius:10px;padding:10px 14px;font-size:13.5px}
.note{font-size:13px;background:var(--bg);border-radius:8px;padding:10px 14px}
.warn{font-size:12.5px;line-height:1.55;background:rgba(240,162,60,.12);border:1px solid rgba(232,139,26,.35);
      border-radius:10px;padding:10px 14px;color:#7a4a06}
.json{margin:0;font-size:11.5px;line-height:1.55;white-space:pre-wrap;word-break:break-all;
      background:#f7f6f3;border-radius:10px;padding:14px}

.overlay{position:fixed;inset:0;background:rgba(16,10,32,.62);display:flex;align-items:center;
         justify-content:center;padding:20px;z-index:50}
.overlay.blur{backdrop-filter:blur(3px)}
.modal{width:100%;background:var(--panel);border-radius:16px;padding:26px;box-sizing:border-box;
       box-shadow:0 30px 80px rgba(0,0,0,.4)}

.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;
        align-items:center;gap:18px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px}
.tab{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--mut);
     font:600 13.5px 'Be Vietnam Pro',sans-serif}
.tab.on{background:var(--ink);color:#fff}
.seg{padding:8px 12px;border-radius:8px;border:1px solid var(--line2);cursor:pointer;background:var(--panel);
     color:var(--ink);font:600 12px 'Be Vietnam Pro',sans-serif}
.seg.on{background:var(--ink);color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;display:flex;
     gap:14px;align-items:center;cursor:pointer;flex-wrap:wrap}
.row:hover{border-color:var(--pri)}
h2.sec{margin:0;font:700 20px 'Be Vietnam Pro',sans-serif}
h3.sec{margin:0;font:700 15px 'Be Vietnam Pro',sans-serif}
.sub{margin:4px 0 0;font-size:13px;color:var(--mut)}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.logmark{font:12.5px/1.5 ui-monospace,Menlo,monospace;background:var(--panel);border:1px solid rgba(32,29,41,.08);
         border-radius:8px;padding:9px 14px;word-break:break-all}
.chk{display:flex;gap:6px;align-items:center;cursor:pointer;font-size:12.5px}
.keytag{font:11px ui-monospace,monospace;background:var(--bg);padding:2px 7px;border-radius:5px}
.tok{font:11px ui-monospace,monospace;background:#f0edff;color:#4930cc;padding:2px 6px;border-radius:5px;
     display:inline-block;margin:2px 3px 0 0}

/* --- guest form: fit the viewport on desktop, never scroll the page --- */
.home{display:flex;flex-direction:column;align-items:center;padding:52px 20px 32px}
.hero{display:flex;flex-direction:column;align-items:center;gap:10px}
.hero h1{margin:10px 0 0;font:600 clamp(30px,5vw,44px)/1.1 'Playfair Display',serif;font-style:italic;text-align:center}
.hero p{margin:4px 0 0;max-width:440px;text-align:center;font-size:15px;line-height:1.6;color:var(--mut)}
.rule{width:120px;height:1px;background:linear-gradient(90deg,transparent,#c9b8f5,transparent);margin:14px 0 6px}
.formwrap{width:100%;max-width:560px;padding:28px;margin-top:18px;min-height:0;overflow:auto}
.form-grid{display:flex;flex-direction:column;gap:18px}
.foot{margin-top:auto;padding-top:36px;font-size:13px;display:flex;gap:18px}

/* --- finished card / lookup: preview beside the side panel --- */
.cardscreen{display:flex;flex-direction:column;align-items:center;padding:28px 16px}
.cardlayout{width:100%;max-width:1120px;display:flex;gap:22px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.cardpane{flex:1 1 380px;max-width:620px;min-width:0;display:flex;flex-direction:column;gap:14px}
.cardframe{border-radius:14px;overflow:hidden;box-shadow:0 20px 50px rgba(32,29,41,.25);line-height:0;
           display:flex;justify-content:center;align-items:center;min-height:0}
.cardframe canvas{max-width:100%;height:auto;display:block}
.cardbtns{display:flex;gap:12px;flex-wrap:wrap}
.editpane{flex:1 1 320px;max-width:400px;min-width:0;padding:22px;display:flex;flex-direction:column;gap:14px}

@media (min-width:900px) and (min-height:640px){
  .home{height:100vh;overflow:hidden;padding:30px 20px 18px}
  .foot{padding-top:16px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
  .form-grid > .full{grid-column:1/-1}
}
@media (min-width:980px) and (min-height:640px){
  .cardscreen{height:100vh;overflow:hidden;padding:20px 16px}
  .cardlayout{flex:1;min-height:0;flex-wrap:nowrap}
  .cardpane{min-height:0}
  .cardframe{flex:1;min-height:0}
  .cardframe canvas{max-height:100%;width:auto;height:auto}
  .editpane{max-height:100%;overflow:auto}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

/* ---------- utils ---------- */
const $ = (sel) => document.querySelector(sel);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const uid = () => Math.random().toString(36).slice(2, 10);

function downloadHref(name, href) {
  const a = document.createElement('a');
  a.download = name; a.href = href; a.click();
}
const downloadJson = (name, obj) =>
  downloadHref(name, 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(obj, null, 2)));

/* ---------- server API ---------- */
let token = sessionStorage.getItem('ecard.token') || '';
const setToken = (t) => {
  token = t || '';
  t ? sessionStorage.setItem('ecard.token', t) : sessionStorage.removeItem('ecard.token');
};

async function api(path, { method = 'GET', body } = {}) {
  const res = await fetch(path, {
    method,
    headers: {
      ...(body ? { 'Content-Type': 'application/json' } : {}),
      ...(token ? { Authorization: 'Bearer ' + token } : {})
    },
    body: body ? JSON.stringify(body) : undefined
  });
  let json = {};
  try { json = await res.json(); } catch (e) { /* empty body */ }
  if (!res.ok) {
    const err = new Error(json.error || ('Lỗi máy chủ (HTTP ' + res.status + ')'));
    err.status = res.status;
    throw err;
  }
  return json;
}

/* ---------- canvas rendering ---------- */
const FONTS = ['Playfair Display', 'Montserrat', 'Cormorant Garamond', 'Be Vietnam Pro'];
const WEIGHTS = ['400', '500', '600', '700', '800'];
const DEFAULT_THEME = { c1: '#2b1657', c2: '#120a2e', glow: 'rgba(147,88,255,.45)', gold: '#e9c88f', soft: '#d9cff0' };

const IMGS = {};
function getImg(src) {
  let e = IMGS[src];
  if (!e) {
    e = { img: new Image(), ok: false };
    e.img.onload = () => { e.ok = true; render(); };
    e.img.src = src;
    IMGS[src] = e;
  }
  return e.ok ? e.img : null;
}
function drawBg(ctx, ev) {
  const w = ev.w, h = ev.h;
  if (ev.bg) {
    const img = getImg(ev.bg);
    ctx.fillStyle = '#141021'; ctx.fillRect(0, 0, w, h);
    if (img) {
      const sc = Math.max(w / img.width, h / img.height);
      const dw = img.width * sc, dh = img.height * sc;
      ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
    }
    return;
  }
  const t = ev.theme || DEFAULT_THEME;
  const lg = ctx.createLinearGradient(0, 0, 0, h);
  lg.addColorStop(0, t.c1); lg.addColorStop(1, t.c2);
  ctx.fillStyle = lg; ctx.fillRect(0, 0, w, h);
  const rg = ctx.createRadialGradient(w / 2, h * 0.42, 60, w / 2, h * 0.42, w * 0.62);
  rg.addColorStop(0, t.glow); rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = t.gold; ctx.globalAlpha = 0.5; ctx.lineWidth = 3;
  ctx.strokeRect(34, 34, w - 68, h - 68);
  ctx.globalAlpha = 0.22; ctx.lineWidth = 1; ctx.strokeRect(48, 48, w - 96, h - 96);
  ctx.globalAlpha = 0.9; ctx.fillStyle = t.gold;
  ctx.beginPath(); ctx.arc(w / 2, 128, 4, 0, 7); ctx.fill();
  ctx.fillRect(w / 2 - 90, 126, 60, 2); ctx.fillRect(w / 2 + 30, 126, 60, 2);
  ctx.globalAlpha = 1;
}
function resolveText(f, payload) {
  if (f.type === 'static') return f.text || '';
  const v = (payload.data && payload.data[f.bind] != null
    ? payload.data[f.bind]
    : (payload.computed ? payload.computed[f.bind] : '')) || '';
  return (f.prefix || '') + v;
}
function drawText(ctx, f, text) {
  if (!text) return;
  if (f.upper) text = String(text).toUpperCase();
  let size = f.size;
  ctx.font = `${f.weight || '400'} ${size}px "${f.font}"`;
  try { ctx.letterSpacing = (f.ls || 0) + 'px'; } catch (e) {}
  if (f.maxW > 0) {
    const m = ctx.measureText(text).width;
    if (m > f.maxW) {
      size = Math.max(10, size * f.maxW / m);
      ctx.font = `${f.weight || '400'} ${size}px "${f.font}"`;
    }
  }
  ctx.textAlign = f.align || 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = f.color || '#fff';
  ctx.fillText(text, f.x, f.y + size * 0.75);
  try { ctx.letterSpacing = '0px'; } catch (e) {}
}
function drawQr(ctx, f, content) {
  const size = f.size || 200, x = f.x - size / 2, y = f.y;
  ctx.fillStyle = '#ffffff';
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x - 12, y - 12, size + 24, size + 24, 12); ctx.fill(); }
  else ctx.fillRect(x - 12, y - 12, size + 24, size + 24);
  ctx.fillStyle = '#1a1030';
  if (window.qrcode) {
    try {
      const qr = window.qrcode(0, 'M');
      qr.addData(content); qr.make();
      const n = qr.getModuleCount(), cell = size / n;
      for (let ri = 0; ri < n; ri++)
        for (let ci = 0; ci < n; ci++)
          if (qr.isDark(ri, ci)) ctx.fillRect(x + ci * cell, y + ri * cell, Math.ceil(cell), Math.ceil(cell));
      return;
    } catch (e) {}
  }
  // decorative fallback only — a real scannable QR needs the library
  const n = 25, cell = size / n, seed = Shared.hash(content);
  for (let ri = 0; ri < n; ri++) for (let ci = 0; ci < n; ci++) {
    const inFinder = (ri < 7 && ci < 7) || (ri < 7 && ci >= n - 7) || (ri >= n - 7 && ci < 7);
    if (inFinder) {
      const rr = Math.min(ri, 6), cc = ci >= n - 7 ? ci - (n - 7) : Math.min(ci, 6);
      if (rr === 0 || rr === 6 || cc === 0 || cc === 6 || (rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4))
        ctx.fillRect(x + ci * cell, y + ri * cell, Math.ceil(cell), Math.ceil(cell));
    } else if ((Shared.hash(seed + '-' + ri + '-' + ci) % 100) < 46) {
      ctx.fillRect(x + ci * cell, y + ri * cell, Math.ceil(cell), Math.ceil(cell));
    }
  }
}
function drawCard(canvas, ev, payload) {
  canvas.width = ev.w; canvas.height = ev.h;
  const ctx = canvas.getContext('2d');
  drawBg(ctx, ev);
  for (const f of ev.fields) {
    if (f.type === 'qr') drawQr(ctx, f, payload.computed.qrContent);
    else drawText(ctx, f, resolveText(f, payload));
  }
}

/* ---------- state ---------- */
const S = {
  view: 'home', booted: false, bootErr: '', busy: false,
  events: [], guests: [], logs: [],
  selEventId: '', formValues: {}, formErr: '',
  dupe: null, card: null, cardEdit: {}, cardMsg: '', cardErr: false, copyLabel: 'Copy JSON',
  lookupEventId: '', lookupName: '', lookupPhone: '', lookupErr: '', lookupResult: null,
  loginVal: '', loginErr: '', authed: false,
  adminTab: 'events', viewGuest: null,
  editor: null, apiTest: null, emailTemplateId: '', sendEmailTemplateId: ''
};
const curEvent = () => S.events.find((e) => e.id === S.selEventId);

/* ---------- handler registry + event delegation ---------- */
let handlers = {}, hSeq = 0;
function on(fn) { const k = 'h' + (++hSeq); handlers[k] = fn; return k; }
const fire = (attr) => (e) => {
  const t = e.target.closest('[data-' + attr + ']');
  if (!t) return;
  if (t.tagName === 'A') e.preventDefault();
  const fn = handlers[t.dataset[attr]];
  if (fn) fn(e, t);
};

/* ---------- routing ---------- */
const PATH_OF = { home: '/', lookup: '/tra-cuu', login: '/admin', admin: '/admin' };
const viewForPath = (p) =>
  p === '/tra-cuu' ? 'lookup' : p === '/admin' ? (S.authed ? 'admin' : 'login') : 'home';

/* ---------- render ---------- */
// Entrance animations replay on every innerHTML rebuild, which reads as flicker.
// Only animate when a render presents something new; otherwise hold the scroll.
let animate = true;
const fade = () => (animate ? ' fade' : '');

function render() {
  const app = $('#app');
  const ae = document.activeElement;
  const k = ae && ae.dataset ? ae.dataset.k : null;
  let selStart = null, selEnd = null;
  if (k) { try { selStart = ae.selectionStart; selEnd = ae.selectionEnd; } catch (e) {} }
  const sy = window.scrollY;

  handlers = {};
  app.innerHTML = viewFor(S.view) + (S.dupe ? dupeModal() : '') + (S.viewGuest ? guestModal() : '');
  window.scrollTo(0, animate ? 0 : sy);
  animate = false;

  if (k) {
    const el = app.querySelector('[data-k="' + k + '"]');
    if (el) {
      el.focus();
      if (selStart != null) { try { el.setSelectionRange(selStart, selEnd); } catch (e) {} }
    }
  }
  paint();
}
function viewFor(v) {
  if (!S.booted) {
    return `<div class="screen" style="display:flex;align-items:center;justify-content:center;padding:20px">
      <div class="${S.bootErr ? 'err' : 'muted'}">${esc(S.bootErr || 'Đang tải…')}</div></div>`;
  }
  if (v === 'card') return cardView();
  if (v === 'lookup') return lookupView();
  if (v === 'login') return loginView();
  if (v === 'admin') return adminView();
  if (v === 'editor') return editorView();
  return homeView();
}
function paint() {
  if (S.view === 'card' && S.card) {
    const c = $('#cardCanvas'), ev = S.events.find((e) => e.id === S.card.eventId);
    if (c && ev) drawCard(c, ev, S.card.payload);
  }
  if (S.view === 'lookup' && S.lookupResult) {
    const c = $('#lookupCanvas'), ev = S.events.find((e) => e.id === S.lookupResult.eventId);
    if (c && ev) drawCard(c, ev, S.lookupResult);
  }
  if (S.view === 'editor' && S.editor) {
    // placements are positioned from the wrapper's real width, only measurable
    // after the markup lands — re-render once when it changes
    const wrap = $('#edWrap');
    if (wrap && wrap.clientWidth && wrap.clientWidth !== S._edW) {
      S._edW = wrap.clientWidth;
      return render();
    }
    const c = $('#edCanvas'), ev = S.editor.ev;
    if (c) {
      const sc = 0.5;
      c.width = ev.w * sc; c.height = ev.h * sc;
      const ctx = c.getContext('2d');
      ctx.save(); ctx.scale(sc, sc); drawBg(ctx, ev); ctx.restore();
    }
  }
}
function go(view, patch) {
  animate = S.view !== view;
  Object.assign(S, patch || {}, { view });
  const p = PATH_OF[view];
  if (p && location.pathname !== p) history.pushState({}, '', p);
  render();
}
addEventListener('popstate', () => {
  const v = viewForPath(location.pathname);
  animate = S.view !== v;
  S.view = v;
  render();
});

/* ---------- shared: one input block per declared event field ---------- */
function fieldBlock(i, value, kPrefix, onChange, cls) {
  const ch = on(onChange);
  const k = `${kPrefix}.${esc(i.key)}`;
  const control = i.type === 'select'
    ? `<select class="inp" data-k="${k}" data-change="${ch}">
         <option value="">${esc(i.label)}</option>
         ${(i.options || []).map((o) => `<option value="${esc(o)}"${o === value ? ' selected' : ''}>${esc(o)}</option>`).join('')}
       </select>`
    : `<input class="inp" data-k="${k}" data-change="${ch}"
              value="${esc(value)}" placeholder="${esc(i.placeholder || '')}">`;
  return `<div class="field ${cls || ''}"><label class="lbl">${esc(i.label.toUpperCase())}</label>${control}</div>`;
}

/* ---------- home: guest form ---------- */
function homeView() {
  const ev = curEvent();
  const n = ev ? ev.inputs.length : 0;
  const fields = ev ? ev.inputs.map((i, idx) => fieldBlock(
    i, S.formValues[i.key] || '', 'f',
    // typing must not re-render — that is what made the page flicker
    (e) => { S.formValues[i.key] = e.target.value; if (S.formErr) { S.formErr = ''; render(); } },
    idx === n - 1 && n % 2 === 1 ? 'full' : ''
  )).join('') : '';

  const evChange = on((e) => { S.selEventId = e.target.value; S.formErr = ''; render(); });
  return `
  <div class="screen home">
    <div class="hero${fade()}">
      <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#5b3df5,#8a5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font:700 22px 'Playfair Display',serif">T</div>
      <h1>Tạo thiệp online</h1>
      <p>Chọn sự kiện và nhập thông tin của bạn để nhận thiệp mời cá nhân hóa, tải về ngay.</p>
      <div class="rule"></div>
    </div>
    <div class="panel formwrap${fade()}" style="animation-delay:.08s">
      <div class="eyebrow" style="padding-bottom:14px;border-bottom:1px solid rgba(32,29,41,.08);margin-bottom:20px">THÔNG TIN THIỆP ONLINE</div>
      <div class="form-grid">
        <div class="field full">
          <label class="lbl">SỰ KIỆN THAM GIA</label>
          <select class="inp" data-k="f.event" data-change="${evChange}">
            <option value="">— Chọn sự kiện —</option>
            ${S.events.map((e) => `<option value="${esc(e.id)}"${e.id === S.selEventId ? ' selected' : ''}>${esc(e.name)}</option>`).join('')}
          </select>
        </div>
        ${fields}
        ${S.formErr ? `<div class="err full">${esc(S.formErr)}</div>` : ''}
        <button class="btn pri full" style="padding:14px 22px;font-size:15px" data-click="${on(submit)}"${S.busy ? ' disabled' : ''}>${S.busy ? 'Đang tạo…' : 'Tạo thiệp mời'}</button>
      </div>
    </div>
    <div class="foot">
      <a href="/tra-cuu" class="muted" data-click="${on(() => go('lookup'))}">Tra cứu thiệp đã tạo</a>
      <a href="/admin" class="muted" data-click="${on(() => go(S.authed ? 'admin' : 'login', { loginVal: '', loginErr: '' }))}">Trang quản trị →</a>
    </div>
  </div>`;
}

function showCard(payload) {
  S.card = { eventId: payload.eventId, payload };
  S.cardEdit = { ...payload.data };
  S.cardMsg = ''; S.cardErr = false; S.copyLabel = 'Copy JSON';
  go('card');
}

async function submit() {
  const ev = curEvent();
  if (!ev) { S.formErr = 'Vui lòng chọn sự kiện.'; return render(); }
  for (const i of ev.inputs) {
    if (i.required && !(S.formValues[i.key] || '').trim()) {
      S.formErr = 'Vui lòng nhập: ' + i.label;
      return render();
    }
  }
  S.formErr = ''; S.busy = true; render();
  try {
    const r = await api('/api/guests', { method: 'POST', body: { eventId: ev.id, data: { ...S.formValues } } });
    S.busy = false;
    if (r.dupe) {
      S.dupe = { data: { ...S.formValues }, checkedId: r.dupe[0].id, matches: r.dupe };
      animate = true;
      return render();
    }
    showCard(r.payload);
  } catch (e) {
    S.busy = false; S.formErr = e.message; render();
  }
}

async function resolveDupe(replaceId, force) {
  S.busy = true; render();
  try {
    const r = await api('/api/guests', {
      method: 'POST',
      body: { eventId: S.selEventId, data: S.dupe.data, replaceId, force }
    });
    S.busy = false; S.dupe = null;
    showCard(r.payload);
  } catch (e) {
    S.busy = false; S.dupe = null; S.formErr = e.message; go('home');
  }
}

/* ---------- card result + inline editing ---------- */
function cardView() {
  const ev = S.events.find((e) => e.id === S.card.eventId);
  const fields = ev ? ev.inputs.map((i) => fieldBlock(
    i, S.cardEdit[i.key] || '', 'c',
    (e) => { S.cardEdit[i.key] = e.target.value; }
  )).join('') : '';

  return `

    <div class="cardlayout${fade()}">
      <div class="cardpane">
        <div class="cardbtns">
          <button class="btn gold" style="flex:2;min-width:180px;padding:15px 22px;font-size:15px" data-click="${on(() => downloadCard('#cardCanvas', S.card.payload))}">Tải ảnh về</button>
          <button class="btn" style="flex:1;min-width:120px;padding:15px 22px;font-size:15px" data-click="${on(() => go('home', { card: null }))}">Tạo lại</button>
        </div>
        <div class="cardframe"><canvas id="cardCanvas"></canvas></div>
      </div>
      <div class="panel editpane">
        <div class="eyebrow" style="padding-bottom:12px;border-bottom:1px solid rgba(32,29,41,.08)">CHỈNH SỬA THÔNG TIN</div>
        <div class="muted" style="font-size:12.5px;line-height:1.5">Sửa thông tin rồi bấm <b>Lưu &amp; cập nhật thiệp</b> — thiệp bên cạnh sẽ vẽ lại ngay.</div>
        ${fields}
        ${S.cardMsg ? `<div class="${S.cardErr ? 'err' : 'ok'}">${esc(S.cardMsg)}</div>` : ''}
        <button class="btn pri" style="padding:13px 20px;font-size:14.5px" data-click="${on(saveCardEdits)}"${S.busy ? ' disabled' : ''}>${S.busy ? 'Đang lưu…' : 'Lưu &amp; cập nhật thiệp'}</button>
      </div>
    </div>

}

function downloadCard(sel, payload) {
  const ev = S.events.find((e) => e.id === payload.eventId), c = $(sel);
  if (!ev || !c) return;
  drawCard(c, ev, payload);
  const name = (payload.data.name || 'khach').trim().replace(/\s+/g, '-').toLowerCase();
  downloadHref('thiep-' + name + '.png', c.toDataURL('image/png'));
}

async function saveCardEdits() {
  const ev = S.events.find((e) => e.id === S.card.eventId);
  if (!ev) return;
  for (const i of ev.inputs) {
    if (i.required && !(S.cardEdit[i.key] || '').trim()) {
      S.cardMsg = 'Vui lòng nhập: ' + i.label; S.cardErr = true;
      return render();
    }
  }
  S.busy = true; render();
  try {
    const prev = S.card.payload;
    const r = await api('/api/guests', {
      method: 'POST',
      body: { eventId: ev.id, data: { ...S.cardEdit }, replaceId: prev.id }
    });
    S.busy = false;
    S.card = { eventId: r.payload.eventId, payload: r.payload };
    S.cardErr = false;
    S.cardMsg = r.payload.computed.lucky === prev.computed.lucky
      ? 'Đã cập nhật thiệp.'
      : 'Đã cập nhật thiệp — Lucky Number & mã QR đổi theo tên/SĐT mới.';
    render();
  } catch (e) {
    S.busy = false; S.cardMsg = e.message; S.cardErr = true; render();
  }
}

async function doLookup() {

    return render();
  }
  S.lookupErr = ''; S.busy = true; render();
  try {
    const r = await api('/api/lookup', {
      method: 'POST',
      body: { eventId: S.lookupEventId, name: S.lookupName, phone: S.lookupPhone }
    });
    S.busy = false; S.lookupResult = r.payload; animate = true; render();
  } catch (e) {
    S.busy = false; S.lookupResult = null; S.lookupErr = e.message; render();
  }
}

function adminEvents() {
  const cards = S.events.map((e) => {
    const swatch = e.bg && e.bg.startsWith('/') ? `url('${esc(e.bg)}') center/cover`
      : e.theme ? `linear-gradient(135deg,${e.theme.c1},${e.theme.c2})` : '#201d29';
    const meta = `${e.fields.length} thành phần · ${e.inputs.length} trường nhập · ${S.guests.filter((g) => g.eventId === e.id).length} khách`;
    const apiOn = e.api && e.api.enabled && e.api.url;
    const onRename = on(async () => {
      const n = prompt('Tên sự kiện mới:', e.name);
      if (!n) return;
      e.name = n; await pushEvents(); render();
    });
    const onDel = on(async () => {
      if (!confirm('Xóa sự kiện "' + e.name + '"?')) return;
      S.events = S.events.filter((x) => x.id !== e.id);
      if (S.selEventId === e.id) S.selEventId = S.events[0] ? S.events[0].id : '';
      await pushEvents(); render();
    });
    return `
    <div class="card" style="overflow:hidden;display:flex;flex-direction:column">
      <div style="height:88px;background:${swatch};position:relative">
        <span style="position:absolute;left:14px;bottom:10px;color:#fff;font:600 11px 'Be Vietnam Pro',sans-serif;letter-spacing:.1em;text-shadow:0 1px 3px rgba(0,0,0,.7)">${e.w} × ${e.h}</span>
        ${apiOn ? `<span style="position:absolute;right:10px;top:10px;background:rgba(30,122,70,.92);color:#fff;font:700 10px 'Be Vietnam Pro',sans-serif;padding:3px 8px;border-radius:20px">API</span>` : ''}

      <div style="padding:16px;display:flex;flex-direction:column;gap:10px;flex:1">
        <div style="font:600 14.5px/1.4 'Be Vietnam Pro',sans-serif">${esc(e.name)}</div>
        <div class="muted" style="font-size:12.5px">${esc(meta)}</div>
        <div style="display:flex;gap:8px;margin-top:auto;flex-wrap:wrap">
          <button class="btn dark sm" style="flex:1" data-click="${on(() => go('editor', { editor: { ev: structuredClone(e), sel: null }, apiTest: null }))}">Sửa thiết kế &amp; API</button>

    const base = S.events[S.events.length - 1];

    await pushEvents(); render();
  });
  return `
  <div class="head">
    <div><h2 class="sec">Sự kiện &amp; mẫu thiệp</h2><p class="sub">Mỗi sự kiện là một mẫu thiệp kèm cấu hình API riêng. Bấm "Sửa thiết kế &amp; API".</p></div>

}

  f.type === 'qr' ? '▣ QR check-in'
    : f.type === 'bind' ? '⤷ ' + (f.bind === 'lucky' ? 'Lucky Number' : f.bind)

function addField(f) { S.editor.ev.fields.push(f); S.editor.sel = f.id; render(); }
function selField() { return S.editor.ev.fields.find((f) => f.id === S.editor.sel); }
function edSel(mutate) { const f = selField(); if (f) { mutate(f); render(); } }

function onDragField(e, fid) {
  e.preventDefault();
  S.editor.sel = fid;
  render();
  const wrap = $('#edWrap'), ev = S.editor.ev;
  const f = ev.fields.find((x) => x.id === fid);
  if (!wrap || !f) return;
  const el = wrap.querySelector('[data-fid="' + fid + '"]');
  const scale = wrap.clientWidth / ev.w;
  const sx = e.clientX, sy = e.clientY, ox = f.x, oy = f.y;
  let nx = ox, ny = oy;
  const move = (me) => {
    nx = Math.max(0, Math.min(ev.w, Math.round(ox + (me.clientX - sx) / scale)));
    ny = Math.max(0, Math.min(ev.h, Math.round(oy + (me.clientY - sy) / scale)));
    // move the node directly during the drag; state + full re-render land on pointerup
    if (el) {
      el.style.left = (f.type === 'qr' ? nx - f.size / 2 : nx) * scale + 'px';
      el.style.top = ny * scale + 'px';
    }
  };
  const up = () => {
    window.removeEventListener('pointermove', move);
    window.removeEventListener('pointerup', up);
    f.x = nx; f.y = ny; render();
  };
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', up);
}

function uploadBg(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const rd = new FileReader();
  rd.onload = () => {
    const img = new Image();
    img.onload = () => {
      // downscale before storing — a full-size data URL bloats data.json
      const MAX = 1800, sc = Math.min(1, MAX / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * sc);
      c.height = Math.round(img.height * sc);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      const ev = S.editor.ev;
      ev.bg = c.toDataURL('image/jpeg', 0.85);
      ev.w = c.width; ev.h = c.height;
      render();
    };
    img.src = rd.result;
  };
  rd.readAsDataURL(file);
  e.target.value = '';
}

/* ---------- per-event API integration config ---------- */
const headersToText = (h) => Object.entries(h || {}).map(([k, v]) => `${k}: ${v}`).join('\n');
function textToHeaders(t) {
  const o = {};
  for (const line of String(t).split('\n')) {
    const i = line.indexOf(':');
    if (i > 0) {
      const k = line.slice(0, i).trim();
      if (k) o[k] = line.slice(i + 1).trim();
    }
  }
  return o;
}

function apiPanel(ev) {
  if (!ev.api) {
    ev.api = { enabled: false, url: '', method: 'POST', auth: { type: 'none', username: '', password: null }, headers: {}, bodyTemplate: '' };

  const a = ev.api;
  a.auth = a.auth || { type: 'none', username: '', password: null };
  const t = S.apiTest;
  const toks = Shared.apiPlaceholders(ev).map((k) => `<span class="tok">{{${esc(k)}}}</span>`).join('');

  const onTest = on(async () => {
    S.busy = true; render();
    try {
      // save first so the server tests exactly what is configured here
      S.events = S.events.map((x) => (x.id === ev.id ? ev : x));
      await pushEvents();
      S.apiTest = await api('/api/admin/events/' + ev.id + '/test', { method: 'POST' });
      if (S.apiTest.logs) S.logs = S.apiTest.logs;
    } catch (e) {
      S.apiTest = { result: { ok: false, line: e.message } };
    }
    S.busy = false; render();
  });

  return `
  <div class="card" style="padding:18px;display:flex;flex-direction:column;gap:10px">
    <div class="lbl" style="font-size:13px;letter-spacing:.06em">TÍCH HỢP API BÊN THỨ 3</div>
    <div class="muted" style="font-size:12.5px;line-height:1.5">Máy chủ sẽ gửi payload này mỗi khi khách tạo hoặc sửa thiệp của sự kiện này.</div>

    <label class="chk"><input type="checkbox"${a.enabled ? ' checked' : ''}
      data-change="${on(() => { a.enabled = !a.enabled; render(); })}">Bật gửi tự động</label>

    <div class="field" style="gap:6px">
      <label class="lbl plain">URL</label>
      <input class="inp sm" data-k="api.url" value="${esc(a.url || '')}" placeholder="https://checkin.delfi.vn/api/v1/clients/upsert"
             data-change="${on((e) => { a.url = e.target.value; })}">
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="gap:6px;width:104px">
        <label class="lbl plain">Method</label>
        <select class="inp sm" data-k="api.method" data-change="${on((e) => { a.method = e.target.value; })}">
          ${['POST', 'PUT', 'PATCH'].map((m) => `<option${m === (a.method || 'POST') ? ' selected' : ''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="gap:6px;flex:1;min-width:130px">
        <label class="lbl plain">Xác thực</label>
        <select class="inp sm" data-k="api.authtype" data-change="${on((e) => { a.auth.type = e.target.value; render(); })}">
          <option value="none"${a.auth.type === 'none' ? ' selected' : ''}>Không</option>
          <option value="basic"${a.auth.type === 'basic' ? ' selected' : ''}>Basic Auth</option>
        </select>

    ${a.auth.type === 'basic' ? `
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="gap:6px;flex:1;min-width:120px">
        <label class="lbl plain">Username</label>
        <input class="inp sm" data-k="api.user" value="${esc(a.auth.username || '')}"
               data-change="${on((e) => { a.auth.username = e.target.value; })}">

               placeholder="${a.auth.hasPassword ? '•••••••• (đã lưu)' : 'chưa đặt'}"

  <div class="card" style="padding:18px;display:flex;flex-direction:column;gap:10px">
    <div class="lbl" style="font-size:13px;letter-spacing:.06em">EMAIL RESEND THEO SỰ KIỆN</div>
    <div class="muted" style="font-size:12px;line-height:1.5">${saveHint} Cần đặt <code>RESEND_API_KEY</code> và <code>RESEND_FROM</code> trên Vercel.</div>
    <label class="chk"><input type="checkbox"${cfg.enabled ? ' checked' : ''} data-change="${on(() => { cfg.enabled = !cfg.enabled; render(); })}"> Cho phép gửi email</label>
    <label class="chk"><input type="checkbox"${cfg.sendOnRegister ? ' checked' : ''} data-change="${on(() => { cfg.sendOnRegister = !cfg.sendOnRegister; render(); })}"> Tự gửi thư mời sau khi đăng ký</label>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="gap:6px;flex:1;min-width:150px"><label class="lbl plain">From (tuỳ chọn)</label><input class="inp sm" value="${esc(cfg.from || '')}" placeholder="RESEND_FROM" data-change="${on((e) => { cfg.from = e.target.value; })}"></div>
      <div class="field" style="gap:6px;flex:1;min-width:150px"><label class="lbl plain">Reply-to (tuỳ chọn)</label><input class="inp sm" value="${esc(cfg.replyTo || '')}" data-change="${on((e) => { cfg.replyTo = e.target.value; })}"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select class="inp sm" style="flex:1;min-width:150px" data-change="${on((e) => { S.emailTemplateId = e.target.value; render(); })}">
        ${cfg.templates.map((x) => `<option value="${esc(x.id)}"${x.id === t.id ? ' selected' : ''}>${esc(x.name)}</option>`).join('')}
      </select>
      <button class="btn xs" data-click="${on(() => { const id = 'email-' + uid().slice(0, 6); cfg.templates.push({ id, type: 'invitation', name: 'Email mới', enabled: false, mode: 'attachments', subject: '{{eventName}}', html: '<p>Xin chào {{fullNameDisplay}},</p>' }); S.emailTemplateId = id; render(); })}">+ Template</button>
      <button class="btn danger xs"${cfg.templates.length <= 1 ? ' disabled' : ''} data-click="${on(() => { if (cfg.templates.length <= 1) return; cfg.templates = cfg.templates.filter((x) => x.id !== t.id); S.emailTemplateId = cfg.templates[0].id; render(); })}">Xoá</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="gap:6px;flex:1;min-width:130px"><label class="lbl plain">Tên template</label><input class="inp sm" value="${esc(t.name)}" data-change="${on((e) => { t.name = e.target.value; })}"></div>
      <div class="field" style="gap:6px;width:130px"><label class="lbl plain">Loại</label><select class="inp sm" data-change="${on((e) => { t.type = e.target.value; })}"><option value="invitation"${t.type === 'invitation' ? ' selected' : ''}>Thư mời</option><option value="reminder"${t.type === 'reminder' ? ' selected' : ''}>Reminder</option></select></div>
      <div class="field" style="gap:6px;width:130px"><label class="lbl plain">Hình ảnh</label><select class="inp sm" data-change="${on((e) => { t.mode = e.target.value; })}"><option value="attachments"${t.mode === 'attachments' ? ' selected' : ''}>Đính kèm</option><option value="inline"${t.mode === 'inline' ? ' selected' : ''}>Trong email</option></select></div>
    </div>
    <label class="chk"><input type="checkbox"${t.enabled ? ' checked' : ''} data-change="${on(() => { t.enabled = !t.enabled; })}"> Template đang hoạt động</label>
    <div class="field" style="gap:6px"><label class="lbl plain">Subject</label><input class="inp sm" value="${esc(t.subject)}" data-change="${on((e) => { t.subject = e.target.value; })}"></div>
    <div class="field" style="gap:6px"><label class="lbl plain">HTML email</label><textarea class="inp sm" rows="8" data-change="${on((e) => { t.html = e.target.value; })}">${esc(t.html)}</textarea><div class="muted" style="font-size:11.5px;line-height:1.7">Biến: <code>{{fullNameDisplay}}</code> <code>{{eventName}}</code> <code>{{name}}</code> <code>{{phone}}</code> <code>{{qrImage}}</code> <code>{{cardImage}}</code></div></div>
  </div>`;
}

function inspector(ev, sel) {
  const isText = sel.type !== 'qr';
  const num = (k, label, width, parse) => `
    <div class="field" style="gap:6px;width:${width}">
      <label class="lbl plain">${label}</label>
      <input class="inp sm" data-k="sel.${k}" value="${esc(sel[k] ?? 0)}"
             data-change="${on((e) => { const n = parse(e.target.value); if (n != null) edSel((f) => { f[k] = n; }); })}">
    </div>`;
  const int = (v) => { const n = parseInt(v); return isNaN(n) ? null : n; };
  const alignBtn = (a, label) =>
    `<button class="seg${(sel.align || 'center') === a ? ' on' : ''}" data-click="${on(() => edSel((f) => { f.align = a; }))}">${label}</button>`;

  const bindOptions = [
    ...(ev.inputs || []).map((i) => ({ v: i.key, label: i.label + ' (' + i.key + ')' })),
    { v: 'fullNameDisplay', label: 'Danh xưng + Họ tên (fullNameDisplay)' },
    { v: 'lucky', label: 'Lucky Number (tự sinh)' }
  ];

  return `
  <div style="background:var(--panel);border:2px solid var(--pri);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px">
    <div style="font:700 13px 'Be Vietnam Pro',sans-serif;letter-spacing:.06em;color:var(--pri)">THUỘC TÍNH — ${esc(fieldName(sel))}</div>

    ${sel.type === 'bind' ? `
    <div class="field" style="gap:6px">
      <label class="lbl plain">Nguồn dữ liệu</label>
      <select class="inp sm" data-k="sel.bind" data-change="${on((e) => edSel((f) => { f.bind = e.target.value; }))}">
        ${bindOptions.map((b) => `<option value="${esc(b.v)}"${b.v === sel.bind ? ' selected' : ''}>${esc(b.label)}</option>`).join('')}
      </select>
    </div>
    <div class="field" style="gap:6px">
      <label class="lbl plain">Chữ đứng trước (prefix)</label>
      <input class="inp sm" data-k="sel.prefix" value="${esc(sel.prefix || '')}"
             data-change="${on((e) => edSel((f) => { f.prefix = e.target.value; }))}">
    </div>` : ''}

    ${sel.type === 'static' ? `
    <div class="field" style="gap:6px">
      <label class="lbl plain">Nội dung chữ</label>
      <input class="inp sm" data-k="sel.text" value="${esc(sel.text || '')}"
             data-change="${on((e) => edSel((f) => { f.text = e.target.value; }))}">
    </div>` : ''}

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${num('x', 'X', '86px', int)}
      ${num('y', 'Y', '86px', int)}
      ${num('size', isText ? 'Cỡ chữ' : 'Cỡ QR', '86px', (v) => { const n = int(v); return n == null ? null : Math.max(6, n); })}
    </div>

    ${isText ? `
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="field" style="gap:6px;flex:1;min-width:140px">
        <label class="lbl plain">Font chữ</label>
        <select class="inp sm" data-k="sel.font" data-change="${on((e) => edSel((f) => { f.font = e.target.value; }))}">
          ${FONTS.map((v) => `<option${v === sel.font ? ' selected' : ''}>${esc(v)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="gap:6px;width:90px">
        <label class="lbl plain">Độ đậm</label>
        <select class="inp sm" data-k="sel.weight" data-change="${on((e) => edSel((f) => { f.weight = e.target.value; }))}">
          ${WEIGHTS.map((v) => `<option${v === (sel.weight || '400') ? ' selected' : ''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="gap:6px;width:70px">
        <label class="lbl plain">Màu</label>
        <input type="color" data-k="sel.color" value="${esc(sel.color || '#ffffff')}"
               style="width:100%;height:37px;padding:2px;border-radius:8px;border:1px solid var(--line2);background:#fff;cursor:pointer"
               data-change="${on((e) => edSel((f) => { f.color = e.target.value; }))}">
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div class="field" style="gap:6px">
        <label class="lbl plain">Căn lề</label>
        <div style="display:flex;gap:4px">${alignBtn('left', 'Trái')}${alignBtn('center', 'Giữa')}${alignBtn('right', 'Phải')}</div>
      </div>
      <div class="field" style="gap:6px;width:100px">
        <label class="lbl plain">Giãn chữ (px)</label>
        <input class="inp sm" data-k="sel.ls" value="${esc(sel.ls || 0)}"
               data-change="${on((e) => { const n = parseFloat(e.target.value); edSel((f) => { f.ls = isNaN(n) ? 0 : n; }); })}">
      </div>
      <div class="field" style="gap:6px;width:110px">
        <label class="lbl plain">Rộng tối đa</label>
        <input class="inp sm" data-k="sel.maxW" value="${esc(sel.maxW || 0)}"
               data-change="${on((e) => { const n = parseInt(e.target.value); edSel((f) => { f.maxW = isNaN(n) ? 0 : n; }); })}">
      </div>
    </div>
    <label class="chk">
      <input type="checkbox"${sel.upper ? ' checked' : ''} data-change="${on(() => edSel((f) => { f.upper = !f.upper; }))}">VIẾT HOA toàn bộ
    </label>` : ''}
  </div>`;
}

/* ---------- boot ---------- */
const app = $('#app');
app.addEventListener('click', fire('click'));
app.addEventListener('input', fire('change'));
app.addEventListener('change', (e) => { if (e.target.type === 'file') fire('file')(e); });
app.addEventListener('keydown', fire('key'));
app.addEventListener('pointerdown', fire('down'));

addEventListener('resize', () => { if (S.view === 'editor') render(); });

(async function boot() {
  render();
  try {
    const r = await api('/api/bootstrap');
    S.events = r.events;
    S.selEventId = S.events[0] ? S.events[0].id : '';
    S.lookupEventId = S.selEventId;
  } catch (e) {
    S.bootErr = 'Không kết nối được máy chủ: ' + e.message;
  }
  if (token) {
    try { await loadAdminState(); } catch (e) { setToken(''); }
  }
  S.booted = true;
  S.view = viewForPath(location.pathname);
  animate = true;
  render();

  // re-render once webfonts are ready so canvas metrics use the real faces
  Promise.all([
    '400 20px "Be Vietnam Pro"', '700 20px "Playfair Display"', '800 20px "Playfair Display"',
    '600 20px "Montserrat"', '700 20px "Montserrat"', '600 20px "Cormorant Garamond"'
  ].map((f) => document.fonts.load(f))).then(render).catch(() => {});
})();
</script>
</body>
</html>
